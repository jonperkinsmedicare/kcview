<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Solar panels left -->
  <rect x="4" y="26" width="18" height="12" rx="2" fill="#ffcc00" opacity="0.9"/>
  <line x1="7" y1="26" x2="7" y2="38" stroke="#cc9900" stroke-width="1"/>
  <line x1="11" y1="26" x2="11" y2="38" stroke="#cc9900" stroke-width="1"/>
  <line x1="15" y1="26" x2="15" y2="38" stroke="#cc9900" stroke-width="1"/>
  <line x1="19" y1="26" x2="19" y2="38" stroke="#cc9900" stroke-width="1"/>
  
  <!-- Solar panels right -->
  <rect x="42" y="26" width="18" height="12" rx="2" fill="#ffcc00" opacity="0.9"/>
  <line x1="45" y1="26" x2="45" y2="38" stroke="#cc9900" stroke-width="1"/>
  <line x1="49" y1="26" x2="49" y2="38" stroke="#cc9900" stroke-width="1"/>
  <line x1="53" y1="26" x2="53" y2="38" stroke="#cc9900" stroke-width="1"/>
  <line x1="57" y1="26" x2="57" y2="38" stroke="#cc9900" stroke-width="1"/>
  
  <!-- Body -->
  <rect x="22" y="22" width="20" height="20" rx="3" fill="#888888" stroke="#aaaaaa" stroke-width="1.5"/>
  
  <!-- Antenna -->
  <line x1="32" y1="22" x2="32" y2="12" stroke="#aaaaaa" stroke-width="1.5"/>
  <circle cx="32" cy="11" r="2.5" fill="#ffcc00" opacity="0.9"/>
  
  <!-- Panel connectors -->
  <rect x="20" y="30" width="4" height="4" rx="1" fill="#555"/>
  <rect x="40" y="30" width="4" height="4" rx="1" fill="#555"/>
</svg>
